openapi: 3.0.3
info:
  title: TeamBoard API
  version: 1.0.0

security:
  - bearerAuth: []

paths:

  /user/register:
    post:
      security: []
      summary: Register a new user
      tags: [ User ]
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Registration successful
        '400':
          description: Username or password missing
        '409':
          description: Username already exists

  /user/login:
    post:
      security: []
      summary: Login user
      tags: [ User ]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Username or password missing
        '401':
          description: Invalid credentials

  /user/{id}:
    get:
      summary: Get user by ID
      tags: [ User ]
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '404':
          description: User not found
/auth/logout:
  post:
    summary: Logout user (revoke token)
    tags: [ User ]
    operationId: logout
    responses:
      '200':
        description: Logged out successfully
      '400':
        description: No token provided

/auth/me:
  get:
    summary: Get current authenticated user's username
    tags: [ User ]
    operationId: me
    responses:
      '200':
        description: Username extracted from token
        content:
          application/json:
            schema:
              type: string
      '401':
        description: Unauthorized
  /projects:
    get:
      summary: Get all projects
      tags: [Project]
      operationId: getAllProjects
      responses:
        '200':
          description: List of all projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      summary: Create a new project
      tags: [Project]
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '200':
          description: List of projects after creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid project details
    delete:
      summary: Delete all projects
      tags: [Project]
      operationId: deleteAllProjects
      responses:
        '200':
          description: List of projects after deletion
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /projects/{id}:
    get:
      summary: Get project by ID
      tags: [Project]
      operationId: getProjectById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        name:
          type: string
        surname:
          type: string
        password:
          type: string
        email:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    Project:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string

